name: "Build&Deploy ros-buildtools"

on:
  # Trigger on push to main branch or on version tags
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  release:
    types: [released]

jobs:
  build-and-deploy:
    uses: MOV-AI/.github/.github/workflows/docker-workflow.yml@v3
    with:
      manifest_file: images-manifest.yml
      docker_registry: registry.aws.cloud.mov.ai
      deploy: ${{ contains(github.ref, 'refs/heads/main') || contains(github.ref, 'refs/tags/v')}}
      version: ${GITHUB_REF##*/}
      push_latest: ${{ contains(github.ref, 'refs/heads/main') || contains(github.ref, 'refs/tags/v') }}

    secrets:
      registry_user: ${{ secrets.PORTUS_APP_USER }}
      registry_password: ${{ secrets.PORTUS_APP_TOKEN }}
      pub_registry_user: ${{ secrets.PORTUS_APP_USER }}
      pub_registry_password: ${{ secrets.PORTUS_APP_TOKEN }}
      github_registry_user: ${{ secrets.RAISE_BOT_COMMIT_USER }}
      github_registry_password: ${{ secrets.RAISE_BOT_COMMIT_PASSWORD }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      commit_user: ${{ secrets.RAISE_BOT_COMMIT_USER }}
      commit_mail: ${{ secrets.RAISE_BOT_COMMIT_MAIL }}
      commit_token: ${{ secrets.RAISE_BOT_COMMIT_PASSWORD }}

  publish-artifacts:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: contains(github.ref, 'refs/heads/main') || contains(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish artifact to S3
        id: publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        shell: bash
        run: |
          python3 -m pip install --user awscli --quiet
          
          # Extract version from images-manifest.yml
          VERSION=$(grep "version:" images-manifest.yml | head -1 | awk '{print $2}')
          
          # Publish to S3
          ~/.local/bin/aws s3 cp ./ros-build2.bash s3://movai-scripts/ros-build.bash
          ~/.local/bin/aws s3 cp ./ros-build2.bash s3://movai-scripts/ros-build_${VERSION}.bash
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
